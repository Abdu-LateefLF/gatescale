version: '3.9'

services:
    nginx:
        build:
            context: .
            dockerfile: ./nginx/Dockerfile
        environment:
            - NODE_ENV=${NODE_ENV:-production}
        ports:
            - '80:80'
        depends_on:
            - api
        networks:
            - gatescale-network

    api:
        build: ./backend
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_URL=${REDIS_URL}
            - JWT_SECRET=${JWT_SECRET}
            - API_KEY_HMAC_SECRET=${API_KEY_HMAC_SECRET}
            - NODE_ENV=${NODE_ENV:-production}
        depends_on:
            redis:
                condition: service_started
        networks:
            - gatescale-network
        deploy:
            replicas: 2
    redis:
        image: redis:7
        networks:
            - gatescale-network

networks:
    gatescale-network:

volumes:
    postgres_data:
