version: '3.9'

services:
    nginx:
        build:
            context: .
            dockerfile: ./nginx/Dockerfile
        environment:
            - NODE_ENV=${NODE_ENV:-production}
        ports:
            - '80:80'
        depends_on:
            - api
        networks:
            - gatescale-network

    migrate:
        build: ./backend
        command: sh -c "npm run db:push && npm run db:seed"
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - NODE_ENV=${NODE_ENV:-production}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - gatescale-network

    api:
        build: ./backend
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_URL=${REDIS_URL}
            - JWT_SECRET=${JWT_SECRET}
            - API_KEY_HMAC_SECRET=${API_KEY_HMAC_SECRET}
            - NODE_ENV=${NODE_ENV:-production}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
            migrate:
                condition: service_completed_successfully
        networks:
            - gatescale-network
        deploy:
            replicas: 2

    postgres:
        image: postgres:15
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '6000:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - gatescale-network

    redis:
        image: redis:7
        networks:
            - gatescale-network

networks:
    gatescale-network:

volumes:
    postgres_data:
