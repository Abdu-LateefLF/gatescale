version: '3.9'

services:
    api:
        build:
            context: ./backend
            dockerfile: Dockerfile.dev
        volumes:
            - ./backend:/app
            - /app/node_modules
        ports:
            - '9000:9000'
        environment:
            - DATABASE_URL=postgres://postgres:password@postgres:5432/gatescale
            - REDIS_URL=redis://redis:6379
            - JWT_SECRET=supersecret
            - CLIENT_URL=http://localhost:5173
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - '5173:5173'
        environment:
            - VITE_API_URL=http://localhost:9000

    postgres:
        image: postgres:15
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: gatescale
        ports:
            - '6000:6000'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7
        ports:
            - '6379:6379'
