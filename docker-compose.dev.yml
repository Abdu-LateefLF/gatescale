version: '3.9'

services:
    api:
        build:
            context: ./backend
            dockerfile: Dockerfile.dev
        volumes:
            - ./backend:/app
            - /app/node_modules
        ports:
            - '9000:9000'
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_URL=${REDIS_URL}
            - JWT_SECRET=${JWT_SECRET}
            - CLIENT_URL=${CLIENT_URL}
            - API_KEY_HMAC_SECRET=${API_KEY_HMAC_SECRET}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile.dev
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - '5173:5173'
        environment:
            - VITE_API_URL=${VITE_API_URL}

    postgres:
        image: postgres:15
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '6000:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7
        ports:
            - '6379:6379'
